# 阿里云函数计算部署配置
edition: 1.0.0
name: money-fund-monitor
access: default

vars:
  region: cn-shanghai

services:
  money-fund-monitor:
    component: fc
    props:
      region: ${vars.region}
      service:
        name: money-fund-monitor
        description: 货币基金折价套利监控系统
        internetAccess: true
      function:
        name: app
        description: FastAPI Web应用
        runtime: python3.10
        codeUri: ./deploy.zip
        handler: index.handler
        memorySize: 512
        timeout: 60
        instanceConcurrency: 10
        environmentVariables:
          ALERT_THRESHOLD: "3.0"
      triggers:
        - name: http
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
