# 腾讯云 SCF 部署配置
app: money-fund-monitor
stage: prod

components:
  web:
    component: scf
    inputs:
      name: money-fund-monitor-web
      src:
        src: ./
        exclude:
          - .git/**
          - .env
          - .s/**
          - .serverless/**
          - node_modules/**
          - layer/**
          - deploy/**
          - deps/**
          - scf/timer/**
          - tests/**
          - __pycache__/**
          - "*.zip"
          - s.yaml
          - render.yaml
          - Dockerfile
          - docker-compose.yml
          - DEPLOY*.md
      runtime: CustomRuntime
      handler: scf/web/bootstrap
      description: 货币基金折价套利监控 - Web API
      memorySize: 256
      timeout: 60
      initTimeout: 30
      region: ap-guangzhou
      environmentVariables:
        APP_NAME: 货币基金折价套利监控系统
        DEBUG: "false"
        ALERT_THRESHOLD: "3.0"
        REDIS_PORT: "6379"
        BARK_URL: ${env:BARK_URL}
        SERVERCHAN_KEY: ${env:SERVERCHAN_KEY}
        EMAIL_SMTP: ${env:EMAIL_SMTP}
        EMAIL_PORT: "587"
        EMAIL_USER: ${env:EMAIL_USER}
        EMAIL_PASSWORD: ${env:EMAIL_PASSWORD}
        EMAIL_TO: ${env:EMAIL_TO}
      events:
        - apigw:
            name: money-fund-monitor-api
            parameters:
              protocols:
                - http
                - https
              serviceName: money-fund-monitor
              description: 货币基金折价套利监控 API
              environment: release
              endpoints:
                - path: /
                  method: ANY
                - path: /{proxy+}
                  method: ANY
