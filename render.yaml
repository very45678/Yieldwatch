services:
  - type: web
    name: money-fund-monitor
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: 货币基金折价套利监控系统
      - key: DEBUG
        value: false
      - key: ALERT_THRESHOLD
        value: 3.0
      - key: BARK_URL
        sync: false
      - key: SERVERCHAN_KEY
        sync: false
      - key: EMAIL_SMTP
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_TO
        sync: false
